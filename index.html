<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destrua a Raiva!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: rgb(31, 30, 30);
            font-family: cursive;
            color: rgb(141, 28, 28);
        }
        #game-area {
            width: 500px;
            height:300px;
            border: 2px solid #ffffff;
            position: relative;
            overflow: hidden;
            background-color: #c4c4c4;
        }
        .obstacle {
            width: 40px;
            height: 30px;
            background-image: url("raiva.png");
            background-size: cover;
            position: absolute;
            cursor: pointer;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            color: rgb(6, 104, 6);
        }
    </style>
</head>
<body>
    <h1>Destrua a Raiva!</h1>
    <div id="game-area"></div>
    <p id="message"></p>
    <script src="script.js"></script>
</body>
</html>
